kind = "web"
previewPath = "/"
title = "IT English Practice"
version = "1.0.0"
id = "artifacts/english-practice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25536

[services.development]
run = "pnpm --filter @workspace/english-practice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english-practice", "run", "build" ]
publicDir = "artifacts/english-practice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25536"
BASE_PATH = "/"
